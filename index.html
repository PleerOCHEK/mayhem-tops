<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MayhemSMP — Топ донатеров</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: gold;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background: #2a2a2a;
            color: gold;
        }
        .rank-1 { background: rgba(255,215,0,0.15); }
        .rank-2 { background: rgba(192,192,192,0.1); }
        .rank-3 { background: rgba(205,127,50,0.1); }
        .amount {
            font-weight: bold;
            color: #4caf50;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        .admin-link {
            color: #888;
            text-decoration: none;
            cursor: pointer;
        }
        .admin-link:hover {
            color: gold;
        }
        .admin-panel {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid gold;
        }
        .admin-panel h2 {
            color: gold;
            margin-top: 0;
        }
        .admin-panel input, .admin-panel button {
            padding: 8px 12px;
            margin: 5px;
            background: #1a1a1a;
            border: 1px solid #555;
            color: #e0e0e0;
            border-radius: 4px;
        }
        .admin-panel button {
            cursor: pointer;
            background: #333;
        }
        .admin-panel button:hover {
            background: gold;
            color: #0a0a0a;
        }
        .error {
            color: #ff5555;
            text-align: center;
        }
        .success {
            color: #4caf50;
            text-align: center;
        }
        .login-form {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .login-form input {
            margin: 10px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>💰 Топ донатеров MayhemSMP</h1>
        <div id="donators-list"></div>
        <footer>
            <span class="admin-link" onclick="showLogin()">🔒 Админ-панель</span>
        </footer>
        <div id="login-panel" class="hidden login-form">
            <h2>Вход в админку</h2>
            <input type="text" id="admin-login" placeholder="Логин" value="PleerMC">
            <input type="password" id="admin-password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p id="login-error" class="error"></p>
        </div>
        <div id="admin-panel" class="hidden admin-panel">
            <h2>⚙️ Редактор донатеров</h2>
            <div>
                <input type="text" id="nick" placeholder="Ник игрока">
                <input type="number" id="amount" placeholder="Сумма (руб)">
                <button onclick="addDonator()">➕ Добавить</button>
            </div>
            <table id="admin-table">
                <thead>
                    <tr><th>Ник</th><th>Сумма</th><th></th></tr>
                </thead>
                <tbody id="admin-list"></tbody>
            </table>
            <button onclick="logout()">🚪 Выйти</button>
        </div>
    </div>

    <script>
        // Исходные данные донатеров
        let donators = [
            { nick: "PleerMC", amount: 5000 },
            { nick: "Denis", amount: 3200 },
            { nick: "Timas", amount: 1500 },
            { nick: "PechenkA_6", amount: 1000 },
            { nick: "Leva", amount: 500 }
        ];

        // Сортировка по сумме
        function sortDonators() {
            donators.sort((a, b) => b.amount - a.amount);
        }

        // Отображение топа для игроков
        function renderTop() {
            sortDonators();
            const container = document.getElementById('donators-list');
            if (!donators.length) {
                container.innerHTML = '<p>Пока никто не поддержал сервер. Будь первым!</p>';
                return;
            }
            let html = '<table><thead><tr><th>#</th><th>Игрок</th><th>💰 Сумма</th></tr></thead><tbody>';
            donators.forEach((d, i) => {
                let rankClass = '';
                if (i === 0) rankClass = 'rank-1';
                else if (i === 1) rankClass = 'rank-2';
                else if (i === 2) rankClass = 'rank-3';
                html += `<tr class="${rankClass}"><td>${i+1}</td><td>${escapeHtml(d.nick)}</td><td class="amount">${d.amount} ₽</td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // Отображение админской таблицы
        function renderAdmin() {
            sortDonators();
            const tbody = document.getElementById('admin-list');
            tbody.innerHTML = '';
            donators.forEach((d, i) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = d.nick;
                row.insertCell(1).textContent = d.amount + ' ₽';
                const delCell = row.insertCell(2);
                const delBtn = document.createElement('button');
                delBtn.textContent = '❌';
                delBtn.onclick = () => removeDonator(i);
                delCell.appendChild(delBtn);
            });
        }

        function removeDonator(index) {
            donators.splice(index, 1);
            saveToLocal();
            renderAdmin();
            renderTop();
        }

        function addDonator() {
            const nick = document.getElementById('nick').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            if (!nick || isNaN(amount) || amount <= 0) {
                alert('Введите корректный ник и сумму');
                return;
            }
            const existing = donators.find(d => d.nick.toLowerCase() === nick.toLowerCase());
            if (existing) {
                existing.amount += amount;
            } else {
                donators.push({ nick, amount });
            }
            saveToLocal();
            renderAdmin();
            renderTop();
            document.getElementById('nick').value = '';
            document.getElementById('amount').value = '';
        }

        function saveToLocal() {
            localStorage.setItem('mayhem_donators', JSON.stringify(donators));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('mayhem_donators');
            if (saved) {
                try {
                    donators = JSON.parse(saved);
                } catch(e) {}
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Админка
        let adminLoggedIn = false;

        function showLogin() {
            document.getElementById('login-panel').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-error').textContent = '';
        }

        function login() {
            const login = document.getElementById('admin-login').value;
            const pass = document.getElementById('admin-password').value;
            if (login === 'PleerMC' && pass === '36743674') {
                adminLoggedIn = true;
                document.getElementById('login-panel').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdmin();
            } else {
                document.getElementById('login-error').textContent = 'Неверный логин или пароль';
            }
        }

        function logout() {
            adminLoggedIn = false;
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-panel').classList.add('hidden');
            renderTop();
        }

        // Проверка URL на ?admin
        if (window.location.search.includes('admin')) {
            showLogin();
        }

        // Инициализация
        loadFromLocal();
        renderTop();
    </script>
</body>
</html>
