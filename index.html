<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MayhemSMP — Топ донатеров | Премиум оформление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* для эстетики, можно убрать */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0b0b1f, #03030a);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Montserrat', sans-serif;
            color: #f0f0f0;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Канва для частиц (анимации) */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(10, 10, 20, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(255, 200, 50, 0.4);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 20px;
        }

        .mode-btn {
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid #FFD966;
            padding: 8px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #FFD966;
            backdrop-filter: blur(4px);
            font-size: 1rem;
        }

        .mode-btn.active {
            background: linear-gradient(95deg, #FFD966, #FFB347);
            color: #0a0a1a;
            box-shadow: 0 0 12px rgba(255, 200, 0, 0.6);
            border-color: transparent;
        }

        /* карточки донатеров */
        .donators-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }

        .donator-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 1.2rem;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            border-left: 6px solid #FFD966;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 12px rgba(0,0,0,0.2);
        }

        .donator-card:hover {
            transform: translateX(5px);
            background: rgba(30, 30, 50, 0.7);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #1e1e2a;
            border: 2px solid gold;
            object-fit: cover;
            box-shadow: 0 0 0 2px #0a0a1a;
        }

        .donator-info {
            flex: 1;
        }

        .nickname {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 3px currentColor;
        }

        .amount {
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(120deg, #A5D6A5, #6FCF97);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .rank-badge {
            font-size: 1.8rem;
            font-weight: bold;
            width: 55px;
            text-align: center;
            color: #FFD966;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.8rem;
            color: #aaa;
        }

        .admin-link {
            color: #FFD966;
            cursor: pointer;
            text-decoration: underline;
            transition: 0.2s;
        }

        .admin-link:hover {
            text-shadow: 0 0 8px gold;
        }

        /* админка */
        .admin-panel, .login-form {
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 2rem;
            border: 1px solid gold;
        }

        .admin-panel h2, .login-form h2 {
            color: gold;
            margin-bottom: 1rem;
        }

        .admin-panel input, .admin-panel button, .login-form input, .login-form button {
            background: #1e1e2e;
            border: 1px solid #444;
            padding: 8px 14px;
            border-radius: 40px;
            color: white;
            margin: 5px;
        }

        button {
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        button:hover {
            background: gold;
            color: black;
            border-color: gold;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .admin-table th, .admin-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #333;
            text-align: left;
            vertical-align: middle;
        }

        .edit-input {
            background: #2a2a3a;
            border: 1px solid gold;
            border-radius: 8px;
            padding: 4px 8px;
            width: 100px;
            color: white;
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #ff7777;
        }

        .particle-selector {
            margin: 15px 0 5px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .particle-selector select {
            background: #1f1f2f;
            border: 1px solid gold;
            border-radius: 40px;
            padding: 6px 16px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .donator-card {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<div class="container" id="app">
    <h1>⚡ MAYHEM SMP ⚡ <span style="font-size: 1.8rem;">ТОП ДОНАТЕРОВ</span></h1>

    <div class="mode-switch">
        <div class="mode-btn active" data-mode="alltime">🏆 ВСЁ ВРЕМЯ</div>
        <div class="mode-btn" data-mode="month">📆 ЗА МЕСЯЦ</div>
    </div>

    <div class="particle-selector">
        <span style="color:#FFD966;">✨ Анимация окружения:</span>
        <select id="effectSelect">
            <option value="snow">❄️ Снегопад</option><option value="rain">🌧️ Дождь</option><option value="fire">🔥 Искры</option>
            <option value="stars">✨ Звездопад</option><option value="bubbles">🫧 Пузырьки</option><option value="confetti">🎉 Конфетти</option>
            <option value="smoke">🌫️ Дымка</option><option value="hearts">💖 Сердечки</option><option value="leaves">🍂 Листопад</option>
            <option value="embers">🔥 Угольки</option><option value="glowdust">✨ Светлячки</option><option value="electric">⚡ Электричество</option>
            <option value="neon">🌈 Неон</option><option value="water">💧 Капли</option><option value="magic">🔮 Магия</option>
            <option value="blood">🩸 Кровавый дождь</option><option value="gold">🪙 Золотые монеты</option><option value="candy">🍬 Конфетти радуга</option>
            <option value="ghost">👻 Призраки</option><option value="cyber">🤖 Кибер-частицы</option><option value="aurora">🌌 Северное сияние</option>
        </select>
    </div>

    <div id="donators-list" class="donators-grid"></div>

    <footer>
        <span class="admin-link" onclick="showLogin()">🔐 Админ-панель (владелец)</span>
    </footer>

    <div id="login-panel" class="hidden login-form">
        <h2>🔒 Вход в админку</h2>
        <input type="text" id="admin-login" placeholder="Логин" value="PleerMC">
        <input type="password" id="admin-password" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <p id="login-error" class="error"></p>
    </div>

    <div id="admin-panel" class="hidden admin-panel">
        <h2>⚙️ Редактор донатов & Цвета ников</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
            <input type="text" id="newNick" placeholder="Ник игрока">
            <input type="number" id="newAmount" placeholder="Сумма (₽)">
            <input type="date" id="newDate">
            <button onclick="addDonator()">➕ Добавить донат</button>
        </div>
        <h3>📋 Список пожертвований</h3>
        <table class="admin-table">
            <thead><tr><th>Ник</th><th>Сумма</th><th>Дата</th><th>Действия</th></tr></thead>
            <tbody id="admin-donations-list"></tbody>
        </table>
        <h3>🎨 Цвета ников (для топа)</h3>
        <table class="admin-table">
            <thead><tr><th>Ник</th><th>Цвет</th><th></th></tr></thead>
            <tbody id="admin-colors-list"></tbody>
        </table>
        <button onclick="logout()">🚪 Выйти из админки</button>
    </div>
</div>

<script>
    // ---------- СТРУКТУРА ДАННЫХ ----------
    let donations = [];     // { nick, amount, date (YYYY-MM-DD) }
    let nickColors = {};   // { "PleerMC": "#ffaa44", ... }

    // Режим отображения: 'alltime' или 'month'
    let currentMode = 'alltime';

    // ---------- ЗАГРУЗКА / СОХРАНЕНИЕ ----------
    function saveData() {
        localStorage.setItem('mayhem_donations', JSON.stringify(donations));
        localStorage.setItem('mayhem_nickColors', JSON.stringify(nickColors));
    }

    function loadData() {
        const storedDon = localStorage.getItem('mayhem_donations');
        if(storedDon) {
            donations = JSON.parse(storedDon);
        } else {
            // начальные демо-данные с датами (последние 3 месяца)
            donations = [
                { nick: "PleerMC", amount: 5000, date: "2026-03-20" },
                { nick: "DenisPRO_NUB", amount: 3099, date: "2026-03-15" },
                { nick: "Timofeus", amount: 549, date: "2026-02-10" },
                { nick: "HeroBrine", amount: 1200, date: "2026-03-01" },
                { nick: "PleerMC", amount: 2500, date: "2026-02-18" },
                { nick: "CrafterGirl", amount: 890, date: "2026-03-22" }
            ];
        }
        const storedColors = localStorage.getItem('mayhem_nickColors');
        if(storedColors) {
            nickColors = JSON.parse(storedColors);
        } else {
            nickColors = {
                "PleerMC": "#FFD966",
                "DenisPRO_NUB": "#C0C0C0",
                "Timofeus": "#CD7F32",
                "HeroBrine": "#8A2BE2",
                "CrafterGirl": "#FF69B4"
            };
        }
    }

    // ---------- АГРЕГАЦИЯ ТОПА (по режиму) ----------
    function getTopDonators(mode) {
        let now = new Date();
        let monthAgo = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 30);
        let filtered = donations.filter(d => {
            if(mode === 'month') {
                let donDate = new Date(d.date);
                return donDate >= monthAgo;
            }
            return true;
        });
        // суммируем по никам
        let map = new Map();
        for(let d of filtered) {
            let nick = d.nick;
            let amount = d.amount;
            map.set(nick, (map.get(nick) || 0) + amount);
        }
        let arr = Array.from(map.entries()).map(([nick, total]) => ({ nick, total }));
        arr.sort((a,b) => b.total - a.total);
        return arr;
    }

    // Рендер ТОПа с аватарками
    async function renderTop() {
        const container = document.getElementById('donators-list');
        if(!container) return;
        const topList = getTopDonators(currentMode);
        container.innerHTML = '';
        for(let i=0; i<topList.length; i++) {
            const item = topList[i];
            const nick = item.nick;
            const total = item.total;
            const color = nickColors[nick] || '#FFFFFF';
            // аватар через minotar (работает с никами)
            const avatarUrl = `https://minotar.net/avatar/${encodeURIComponent(nick)}/64.png`;
            const rank = i+1;
            let rankClass = '';
            let medal = '';
            if(rank === 1) medal = '👑';
            else if(rank === 2) medal = '🥈';
            else if(rank === 3) medal = '🥉';
            else medal = `#${rank}`;
            
            const card = document.createElement('div');
            card.className = 'donator-card';
            card.style.borderLeftColor = color;
            card.innerHTML = `
                <div class="rank-badge">${medal}</div>
                <img class="avatar" src="${avatarUrl}" alt="avatar" onerror="this.src='https://minotar.net/avatar/steve/64.png'">
                <div class="donator-info">
                    <div class="nickname" style="color: ${color};">${escapeHtml(nick)}</div>
                    <div class="amount">${total.toLocaleString()} ₽</div>
                </div>
            `;
            container.appendChild(card);
        }
        if(topList.length === 0) container.innerHTML = '<div style="text-align:center;padding:30px;">💸 Пока нет донатов за выбранный период</div>';
    }

    // ---------- АДМИНКА: редактирование донатов, цвета ----------
    function renderAdminDonations() {
        const tbody = document.getElementById('admin-donations-list');
        if(!tbody) return;
        tbody.innerHTML = '';
        donations.forEach((don, idx) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = `<input type="text" id="editNick_${idx}" value="${escapeHtml(don.nick)}" class="edit-input" style="width:110px;">`;
            row.insertCell(1).innerHTML = `<input type="number" id="editAmount_${idx}" value="${don.amount}" class="edit-input" style="width:90px;">`;
            row.insertCell(2).innerHTML = `<input type="date" id="editDate_${idx}" value="${don.date}" class="edit-input">`;
            const actions = row.insertCell(3);
            actions.innerHTML = `
                <button onclick="saveDonation(${idx})" style="background:#2a5a2a;">💾 Сохранить</button>
                <button onclick="removeDonation(${idx})" style="background:#8b3a3a;">🗑️ Удалить</button>
            `;
        });
    }

    function saveDonation(idx) {
        const newNick = document.getElementById(`editNick_${idx}`).value.trim();
        const newAmount = parseFloat(document.getElementById(`editAmount_${idx}`).value);
        const newDate = document.getElementById(`editDate_${idx}`).value;
        if(!newNick || isNaN(newAmount) || newAmount<=0 || !newDate) {
            alert("Некорректные данные");
            return;
        }
        donations[idx] = { nick: newNick, amount: newAmount, date: newDate };
        saveData();
        renderAdminDonations();
        renderAdminColors();   // обновить цвета (возможно новый ник)
        renderTop();
    }

    function removeDonation(idx) {
        if(confirm("Удалить донат?")) {
            donations.splice(idx,1);
            saveData();
            renderAdminDonations();
            renderAdminColors();
            renderTop();
        }
    }

    function renderAdminColors() {
        const tbody = document.getElementById('admin-colors-list');
        if(!tbody) return;
        const uniqueNicks = [...new Set(donations.map(d => d.nick))];
        tbody.innerHTML = '';
        for(let nick of uniqueNicks) {
            const currentColor = nickColors[nick] || '#ffffff';
            const row = tbody.insertRow();
            row.insertCell(0).innerText = nick;
            const colorCell = row.insertCell(1);
            const colorPicker = document.createElement('input');
            colorPicker.type = 'color';
            colorPicker.value = currentColor;
            colorPicker.addEventListener('change', (e) => {
                nickColors[nick] = e.target.value;
                saveData();
                renderTop();
                renderAdminColors();
            });
            colorCell.appendChild(colorPicker);
            const preview = document.createElement('div');
            preview.className = 'color-preview';
            preview.style.backgroundColor = currentColor;
            colorCell.appendChild(preview);
            row.insertCell(2).innerHTML = `<button onclick="resetNickColor('${nick}')">Сбросить</button>`;
        }
    }

    function resetNickColor(nick) {
        delete nickColors[nick];
        saveData();
        renderAdminColors();
        renderTop();
    }

    function addDonator() {
        const nick = document.getElementById('newNick').value.trim();
        const amount = parseFloat(document.getElementById('newAmount').value);
        let date = document.getElementById('newDate').value;
        if(!nick || isNaN(amount) || amount<=0) {
            alert("Введите ник и сумму");
            return;
        }
        if(!date) {
            date = new Date().toISOString().slice(0,10);
        }
        donations.push({ nick, amount, date });
        saveData();
        renderAdminDonations();
        renderAdminColors();
        renderTop();
        document.getElementById('newNick').value = '';
        document.getElementById('newAmount').value = '';
        document.getElementById('newDate').value = '';
    }

    // ---------- АВТОРИЗАЦИЯ ----------
    function showLogin() {
        document.getElementById('login-panel').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
    }
    function login() {
        const login = document.getElementById('admin-login').value;
        const pwd = document.getElementById('admin-password').value;
        if(login === 'PleerMC' && pwd === '36743674') {
            document.getElementById('login-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderAdminDonations();
            renderAdminColors();
        } else {
            document.getElementById('login-error').innerText = 'Неверный логин или пароль';
        }
    }
    function logout() {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('login-panel').classList.add('hidden');
    }

    // ---------- ЧАСТИЦЫ: 20+ ВАРИАНТОВ ----------
    let canvas, ctx, particles = [], animationId, currentEffect = 'snow';
    const effects = {
        snow: { color: "#fff", size: 2, speedY: 0.5, speedX: 0.2, gravity: 0.02, count: 80, shape: 'circle' },
        rain: { color: "#88ccff", size: 1, speedY: 3, speedX: 0.5, gravity: 0.1, count: 150, shape: 'line' },
        fire: { color: "#ff6600", size: 3, speedY: -1.2, speedX: 0.3, gravity: -0.05, count: 60, shape: 'circle', flicker:true },
        stars: { color: "#ffffaa", size: 2, speedY: 0.1, speedX: 0.05, gravity: 0, count: 100, shape: 'star' },
        bubbles: { color: "#aaf0ff", size: 3, speedY: -0.8, speedX: 0.2, gravity: -0.03, count: 70, shape: 'circle' },
        confetti: { color: "random", size: 4, speedY: 1.2, speedX: 1, gravity: 0.05, count: 120, shape: 'rect' },
        smoke: { color: "#aaa", size: 5, speedY: -0.3, speedX: 0.1, gravity: -0.01, count: 50, shape: 'circle', fade:true },
        hearts: { color: "#ff66cc", size: 3, speedY: -0.9, speedX: 0.2, gravity: -0.02, count: 65, shape: 'heart' },
        leaves: { color: "#6b8e23", size: 4, speedY: 0.6, speedX: 0.4, gravity: 0.03, count: 70, shape: 'leaf' },
        embers: { color: "#ff8844", size: 2, speedY: -0.7, speedX: 0.15, gravity: -0.02, count: 80, shape: 'circle' },
        glowdust: { color: "#ffdd99", size: 2, speedY: 0.2, speedX: 0.3, gravity: 0.01, count: 100, shape: 'glow' },
        electric: { color: "#7df9ff", size: 2, speedY: 0.9, speedX: 1.2, gravity: 0.05, count: 110, shape: 'line', zigzag:true },
        neon: { color: "#ff44ff", size: 3, speedY: 0.4, speedX: 0.5, gravity: 0.02, count: 90, shape: 'circle' },
        water: { color: "#3399ff", size: 2, speedY: 1.2, speedX: 0.3, gravity: 0.08, count: 130, shape: 'circle' },
        magic: { color: "#cc44ff", size: 3, speedY: -0.5, speedX: 0.4, gravity: 0, count: 85, shape: 'star' },
        blood: { color: "#aa2222", size: 2, speedY: 1.1, speedX: 0.2, gravity: 0.07, count: 95, shape: 'drop' },
        gold: { color: "#ffcc33", size: 3, speedY: 0.3, speedX: 0.2, gravity: 0.03, count: 100, shape: 'coin' },
        candy: { color: "random", size: 3, speedY: 0.8, speedX: 0.9, gravity: 0.04, count: 140, shape: 'rect' },
        ghost: { color: "#ddddff", size: 5, speedY: -0.4, speedX: 0.1, gravity: -0.02, count: 40, shape: 'ghost' },
        cyber: { color: "#0ff", size: 2, speedY: 0.7, speedX: 0.8, gravity: 0.02, count: 110, shape: 'square' },
        aurora: { color: "#44ffaa", size: 4, speedY: 0.2, speedX: 0.1, gravity: 0, count: 70, shape: 'wave' }
    };

    function initParticles() {
        const conf = effects[currentEffect];
        if(!conf) return;
        particles = [];
        let count = conf.count;
        for(let i=0;i<count;i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: conf.size + Math.random() * 2,
                speedX: (Math.random() - 0.5) * conf.speedX,
                speedY: (Math.random() - 0.5) * conf.speedY + (conf.gravity || 0),
                color: conf.color === 'random' ? `hsl(${Math.random()*360},70%,60%)` : conf.color,
                life: 1,
                shape: conf.shape
            });
        }
    }

    function drawParticle(p) {
        if(!ctx) return;
        ctx.save();
        ctx.globalAlpha = p.life || 1;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        if(p.shape === 'circle') ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        else if(p.shape === 'rect') ctx.fillRect(p.x, p.y, p.size, p.size);
        else if(p.shape === 'line') { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.size, p.y+p.size*0.5); ctx.strokeStyle = p.color; ctx.lineWidth = 1; ctx.stroke(); return; }
        else if(p.shape === 'star') { /* упрощенно звезда */ ctx.fillRect(p.x, p.y, p.size, p.size); }
        else { ctx.fillRect(p.x, p.y, p.size, p.size); }
        ctx.fill();
        ctx.restore();
    }

    function updateParticles() {
        const conf = effects[currentEffect];
        if(!conf) return;
        for(let i=0;i<particles.length;i++) {
            let p = particles[i];
            p.x += p.speedX;
            p.y += p.speedY;
            if(p.y > canvas.height+50) p.y = -50;
            if(p.y < -50) p.y = canvas.height+50;
            if(p.x > canvas.width+50) p.x = -50;
            if(p.x < -50) p.x = canvas.width+50;
            if(conf.fade) p.life = p.life ? p.life-0.005 : 1;
            if(p.life && p.life<0.02) { p.x=Math.random()*canvas.width; p.y=Math.random()*canvas.height; p.life=1; }
        }
    }

    function animateParticles() {
        if(!canvas || !ctx) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for(let p of particles) drawParticle(p);
        updateParticles();
        animationId = requestAnimationFrame(animateParticles);
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
    }

    function changeEffect(effect) {
        currentEffect = effect;
        if(canvas) initParticles();
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ UI ----------
    function bindEvents() {
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                renderTop();
            });
        });
        const select = document.getElementById('effectSelect');
        select.addEventListener('change', (e) => changeEffect(e.target.value));
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    window.onload = () => {
        loadData();
        canvas = document.getElementById('particle-canvas');
        ctx = canvas.getContext('2d');
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        changeEffect('snow');
        animateParticles();
        bindEvents();
        renderTop();
        // если в URL admin
        if(window.location.search.includes('admin')) showLogin();
    };
    window.saveDonation = saveDonation;
    window.removeDonation = removeDonation;
    window.resetNickColor = resetNickColor;
    window.addDonator = addDonator;
    window.showLogin = showLogin;
    window.login = login;
    window.logout = logout;
</script>
</body>
